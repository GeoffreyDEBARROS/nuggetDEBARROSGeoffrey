    <h1>Contacte nous !</h1>

    <h4>Pour une demande d'informations, t'inscrire a un évenements, ou juste pour nous dire ta recette de nuggets préféré</h4>

    <div class="form">
        <form action="/my-handling-form-page" method="post">
            <div>
                <label for="name">Nom complet:</label>
                <input type="text" id="name" name="username" placeholder="Nom et prénom">
            </div>
            <div>
                <label for="mail">E-mail:</label>
                <input type="email" id="mail" name="useremail" placeholder="Mon e-mail">
            </div>
            <div>
                <label for="msg">Message:</label>
                <textarea name="usermsg" id="msg" cols="30" rows="10" placeholder="Mon message"></textarea>
            </div>
            <div>
                <input class="submit" type="submit" value="Envoyer">
            </div>
        </form>
